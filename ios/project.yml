name: Spore
options:
  bundleIdPrefix: com.spore
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Spore:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: Spore
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        SPORE_API_BASE_URL: ""
        SPORE_CAPTURE_TOKEN: ""
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.spore.app
        SWIFT_EMIT_LOC_STRINGS: YES
        TARGETED_DEVICE_FAMILY: "1"

  SporeTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.spore.app.tests
        SWIFT_VERSION: "5.0"
    dependencies:
      - target: Spore

schemes:
  Spore:
    build:
      targets:
        Spore: all
        SporeTests: [test]
    test:
      targets:
        - SporeTests
    run:
      config: Debug
