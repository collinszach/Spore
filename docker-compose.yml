# Spore — docker-compose.yml  (story 1.1: backend spine)
# `docker compose up -d` boots the full local stack.

services:
  db:
    image: timescale/timescaledb-ha:pg16          # Postgres 16 + TimescaleDB; add pgvector via init
    environment:
      POSTGRES_USER: spore
      POSTGRES_PASSWORD: spore
      POSTGRES_DB: spore
    expose: ["5432"]                                 # internal-only; reachable as db:5432 on the compose network (NFR4)
    volumes:
      - spore_pg:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro   # 001_init.sql runs on first boot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spore"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    expose: ["6379"]                                 # internal-only; reachable as redis:6379 on the compose network (NFR4)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://spore:spore@db:5432/spore
      REDIS_URL: redis://redis:6379/0
      VAULT_PATH: /vault/_sandbox                    # dev sandbox; real vault is sacred (CLAUDE.md rule 6)
      EMBEDDINGS_PROVIDER: ollama                    # local embeddings; no cloud cost
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_MODEL: mxbai-embed-large             # 1024-dim, matches schema (ADR-002)
      SKILLS_DIR: /skills                            # declarative skill registry (drop a file, no rebuild — FR21)
      TRANSCRIPTION_PROVIDER: whisper                # local STT (ADR-001 → local)
      WHISPER_URL: http://whisper:9000
      MEDIA_DIR: /media                              # uploaded audio storage
    ports: ["8020:8020"]                            # Spore API (KoastCast uses 8010/8011 — avoid clash)
    volumes:
      - ./vault:/vault                               # persist agent vault writes on the host (git repo under _sandbox)
      - ./skills:/skills:ro                          # runtime skill registry (read-only)
      - ./media:/media                               # uploaded audio (voice captures)
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    env_file: .env                                 # SPORE_CAPTURE_TOKEN for the triage cron auth header
    environment:
      N8N_PORT: 5678
      N8N_HOST: localhost
      GENERIC_TIMEZONE: America/New_York
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"        # allow {{ $env.SPORE_CAPTURE_TOKEN }} in the HTTP node
    ports: ["5678:5678"]
    volumes:
      - spore_n8n:/home/node/.n8n

  # Local speech-to-text — Whisper (faster-whisper). No cloud, no per-minute cost (ADR-001 → local).
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    environment:
      ASR_ENGINE: faster_whisper
      ASR_MODEL: base                                # CPU-friendly; bump to small/medium for accuracy
    expose: ["9000"]                                 # internal-only (NFR4); reachable as whisper:9000
    volumes:
      - spore_whisper:/root/.cache
    restart: unless-stopped

  # Local embeddings — Ollama serving mxbai-embed-large (1024-dim). No cloud, no per-token cost.
  ollama:
    image: ollama/ollama:latest
    expose: ["11434"]                              # internal-only (NFR4); reachable as ollama:11434
    volumes:
      - spore_ollama:/root/.ollama
    restart: unless-stopped

  # Cloudflare Tunnel — run with your token to expose api externally, no inbound ports.
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    env_file: .env                                 # TUNNEL_TOKEN=...
    depends_on: [api]
    restart: unless-stopped

volumes:
  spore_pg:
  spore_n8n:
  spore_ollama:
  spore_whisper:
